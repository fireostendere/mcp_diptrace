name: Diagnose Windows

on:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: read

jobs:
  diagnose-windows:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with full output
        shell: pwsh
        run: |
          python -m pytest -vv --tb=long 2>&1 | Tee-Object -FilePath windows-pytest.log
          exit $LASTEXITCODE
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-pytest-diagnostic
          path: windows-pytest.log
