name: Apply CI and semantic fix

on:
  pull_request:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/ci-semantic-comparison-final')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/ci-semantic-comparison-final
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply patch
        run: python scripts/apply_ci_semantic_fix.py
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run Ruff
        run: python -m ruff check --no-cache src tests benchmarks scripts
      - name: Run Mypy
        run: python -m mypy --no-incremental src/diptrace_mcp
      - name: Check generated PCB skills
        run: python scripts/generate_pcb_skills.py --check
      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete semantic comparison and platform CI"
          git push origin HEAD:agent/ci-semantic-comparison-final
