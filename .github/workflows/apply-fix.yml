name: Apply CI and semantic fix

on:
  pull_request:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/ci-semantic-comparison-final')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/ci-semantic-comparison-final
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply patch
        run: python scripts/apply_ci_semantic_fix.py
      - name: Correct normalized bus comparison
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/diptrace_mcp/service.py")
          text = path.read_text()
          text = text.replace(
              '[item.model_dump(mode="json") for item in ss.buses],\n'
              '            [item.model_dump(mode="json") for item in rs.buses],',
              'ss.buses,\n            rs.buses,',
          )
          path.write_text(text)
          PY
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Format and lint generated patch
        run: |
          python -m ruff format src/diptrace_mcp/service.py src/diptrace_mcp/adapters.py src/diptrace_mcp/domain.py src/diptrace_mcp/jobs.py
          python -m ruff check --fix src/diptrace_mcp/service.py src/diptrace_mcp/adapters.py src/diptrace_mcp/domain.py src/diptrace_mcp/jobs.py
          python -m ruff check --no-cache src tests benchmarks scripts
      - name: Run tests
        run: python -m pytest -q
      - name: Run Mypy
        run: python -m mypy --no-incremental src/diptrace_mcp
      - name: Check generated PCB skills
        run: python scripts/generate_pcb_skills.py --check
      - name: Restore temporary workflow files
        run: |
          git restore --source=HEAD -- .github/workflows/ci.yml
          git restore --source=HEAD -- .github/workflows/apply-fix.yml
          git restore --source=HEAD -- .github/workflows/diagnose-windows.yml
          git restore --source=HEAD -- scripts/apply_ci_semantic_fix.py
      - name: Commit validated Python changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/diptrace_mcp/service.py src/diptrace_mcp/adapters.py src/diptrace_mcp/domain.py
          git commit -m "fix: complete semantic roundtrip comparison"
          git push origin HEAD:agent/ci-semantic-comparison-final
