name: Apply CI and semantic fix

on:
  pull_request:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: read

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/ci-semantic-comparison-final')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/ci-semantic-comparison-final
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply patch
        run: python scripts/apply_ci_semantic_fix.py
      - name: Correct normalized bus comparison
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/diptrace_mcp/service.py")
          text = path.read_text()
          text = text.replace(
              '[item.model_dump(mode="json") for item in ss.buses],\n'
              '            [item.model_dump(mode="json") for item in rs.buses],',
              'ss.buses,\n            rs.buses,',
          )
          path.write_text(text)
          PY
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Format and lint generated patch
        run: |
          python -m ruff format src/diptrace_mcp/service.py src/diptrace_mcp/adapters.py src/diptrace_mcp/domain.py src/diptrace_mcp/jobs.py
          python -m ruff check --fix src/diptrace_mcp/service.py src/diptrace_mcp/adapters.py src/diptrace_mcp/domain.py src/diptrace_mcp/jobs.py
          python -m ruff check --no-cache src tests benchmarks scripts
      - name: Run tests
        run: python -m pytest -q
      - name: Run Mypy
        run: python -m mypy --no-incremental src/diptrace_mcp
      - name: Check generated PCB skills
        run: python scripts/generate_pcb_skills.py --check
      - name: Stage validated files
        run: |
          mkdir -p validated-patch/.github/workflows validated-patch/src/diptrace_mcp
          cp .gitattributes validated-patch/.gitattributes
          cp .github/workflows/ci.yml validated-patch/.github/workflows/ci.yml
          cp src/diptrace_mcp/service.py validated-patch/src/diptrace_mcp/service.py
          cp src/diptrace_mcp/adapters.py validated-patch/src/diptrace_mcp/adapters.py
          cp src/diptrace_mcp/domain.py validated-patch/src/diptrace_mcp/domain.py
          cp src/diptrace_mcp/jobs.py validated-patch/src/diptrace_mcp/jobs.py
      - name: Upload validated patch
        uses: actions/upload-artifact@v4
        with:
          name: validated-ci-semantic-patch
          path: validated-patch
