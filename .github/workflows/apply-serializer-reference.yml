name: Apply serializer reference

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feat/serializer-reference' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply serializer reference integration
        run: python scripts/apply_serializer_reference.py
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Format changed Python files
        run: python -m ruff format src/diptrace_mcp/domain.py src/diptrace_mcp/library_adapters.py src/diptrace_mcp/serializer_reference.py tests/test_serializer_reference.py
      - name: Validate repository
        run: |
          python -m pytest -q
          python -m ruff check --no-cache src tests benchmarks scripts
          python -m mypy --no-incremental src/diptrace_mcp
          python scripts/generate_pcb_skills.py --check
      - name: Commit and push verified integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git commit -m 'feat: integrate serializer reference and parser fixes'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
