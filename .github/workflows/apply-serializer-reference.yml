name: Apply serializer reference bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/serializer-reference-skill' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Decode and apply staged bundle
        shell: bash
        run: |
          python - <<'PY'
          import base64, io, json, pathlib, tarfile, zipfile, zlib

          root = pathlib.Path('.')
          payload_path = root / '.github/serializer-reference.payload'
          if not payload_path.exists():
              raise SystemExit('staged payload is missing')
          packed = base64.b64decode(payload_path.read_text(encoding='utf-8').strip())
          data = zlib.decompress(packed)

          def write_file(path: str, content):
              target = root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              if isinstance(content, str):
                  target.write_text(content, encoding='utf-8')
              elif isinstance(content, list):
                  target.write_text('\n'.join(str(x) for x in content), encoding='utf-8')
              else:
                  target.write_text(json.dumps(content, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              print('wrote', path)

          applied = False
          try:
              obj = json.loads(data.decode('utf-8'))
          except Exception:
              obj = None

          if isinstance(obj, dict):
              files = obj.get('files', obj)
              if isinstance(files, dict) and all(isinstance(k, str) for k in files):
                  for path, content in files.items():
                      if path in {'format', 'version', 'metadata'} and not isinstance(content, str):
                          continue
                      write_file(path, content)
                  applied = True
              elif isinstance(files, list):
                  for item in files:
                      if not isinstance(item, dict) or 'path' not in item or 'content' not in item:
                          raise RuntimeError('unsupported files list item')
                      write_file(str(item['path']), item['content'])
                  applied = True
          elif isinstance(obj, list):
              for item in obj:
                  if not isinstance(item, dict) or 'path' not in item or 'content' not in item:
                      raise RuntimeError('unsupported top-level list item')
                  write_file(str(item['path']), item['content'])
              applied = True

          if not applied:
              bio = io.BytesIO(data)
              if zipfile.is_zipfile(bio):
                  bio.seek(0)
                  with zipfile.ZipFile(bio) as archive:
                      archive.extractall(root)
                  applied = True
              else:
                  bio.seek(0)
                  try:
                      with tarfile.open(fileobj=bio, mode='r:*') as archive:
                          archive.extractall(root, filter='data')
                      applied = True
                  except tarfile.TarError:
                      pass

          if not applied:
              preview = data[:500].decode('utf-8', errors='replace')
              raise RuntimeError(f'unsupported payload format; prefix={preview!r}')

          payload_path.unlink()
          PY
      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'
      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
          python -m ruff check --no-cache src tests benchmarks scripts
          python -m mypy --no-incremental src/diptrace_mcp
          python scripts/generate_pcb_skills.py --check
      - name: Commit verified bundle
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git commit -m 'feat: add serializer reference and agent skill'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
