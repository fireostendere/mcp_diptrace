name: Repository branch cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git init cleanup-repo
          cd cleanup-repo
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mapfile -t branches < <(
            git ls-remote --heads origin \
              | awk '{print $2}' \
              | sed 's#^refs/heads/##' \
              | sort
          )

          echo "Branches before cleanup:"
          printf '  %s\n' "${branches[@]}"

          for branch in "${branches[@]}"; do
            [[ "$branch" == "main" ]] && continue
            echo "Deleting $branch"
            git push origin --delete "$branch"
          done

          mapfile -t remaining < <(
            git ls-remote --heads origin \
              | awk '{print $2}' \
              | sed 's#^refs/heads/##' \
              | sort
          )

          echo "Branches after cleanup:"
          printf '  %s\n' "${remaining[@]}"

          [[ "${#remaining[@]}" -eq 1 && "${remaining[0]}" == "main" ]]
