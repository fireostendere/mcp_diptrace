name: Apply serializer reference bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/serializer-reference-skill' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Inspect staged bundle
        shell: bash
        run: |
          python - <<'PY'
          import base64, json, pathlib, zlib
          p = pathlib.Path('.github/serializer-reference.payload')
          data = zlib.decompress(base64.b64decode(p.read_text(encoding='utf-8').strip()))
          report = {
              'bytes': len(data),
              'prefix': data[:2000].decode('utf-8', errors='replace'),
          }
          try:
              obj = json.loads(data.decode('utf-8'))
              report['json_type'] = type(obj).__name__
              if isinstance(obj, dict):
                  report['keys'] = list(obj)[:100]
                  report['value_types'] = {str(k): type(v).__name__ for k, v in list(obj.items())[:50]}
                  if 'files' in obj:
                      files = obj['files']
                      report['files_type'] = type(files).__name__
                      if isinstance(files, dict):
                          report['file_keys'] = list(files)[:100]
                      elif isinstance(files, list):
                          report['files_preview'] = files[:3]
              elif isinstance(obj, list):
                  report['list_preview'] = obj[:3]
          except Exception as exc:
              report['json_error'] = repr(exc)
          pathlib.Path('.github/payload-inspect.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Commit inspection
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/payload-inspect.json
          git commit -m 'chore: inspect serializer payload'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
