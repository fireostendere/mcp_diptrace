name: Apply serializer reference bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/serializer-reference-skill' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect staged bundle through GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY'
          import base64, json, os, urllib.request, zlib
          url = 'https://api.github.com/repos/fireostendere/mcp_diptrace/contents/.github/serializer-reference.payload?ref=agent/serializer-reference-skill'
          req = urllib.request.Request(url, headers={
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          })
          with urllib.request.urlopen(req) as response:
              meta = json.load(response)
          encoded_file = base64.b64decode(meta['content']).decode('utf-8').strip()
          packed = base64.b64decode(encoded_file)
          print('packed_bytes=', len(packed))
          print('packed_prefix=', packed[:16].hex())
          try:
              data = zlib.decompress(packed)
              print('decompressed_bytes=', len(data))
              print('prefix=', repr(data[:1200].decode('utf-8', errors='replace')))
              try:
                  obj = json.loads(data.decode('utf-8'))
                  print('json_type=', type(obj).__name__)
                  if isinstance(obj, dict):
                      print('keys=', list(obj)[:50])
                      print('value_types=', {str(k): type(v).__name__ for k, v in list(obj.items())[:30]})
                      if 'files' in obj:
                          files = obj['files']
                          print('files_type=', type(files).__name__)
                          if isinstance(files, dict):
                              print('file_keys=', list(files)[:50])
                          elif isinstance(files, list):
                              print('files_preview=', repr(files[:2])[:2000])
                  elif isinstance(obj, list):
                      print('list_preview=', repr(obj[:2])[:2000])
              except Exception as exc:
                  print('json_error=', repr(exc))
          except Exception as exc:
              print('zlib_error=', repr(exc))
              raise
          PY
