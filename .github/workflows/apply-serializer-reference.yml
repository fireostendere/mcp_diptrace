name: Apply serializer reference bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/serializer-reference-skill' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Assemble reference and patch parser
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          parts = [root / f'.github/serializer-reference.part{i}' for i in (1, 2, 3)]
          if not all(path.exists() for path in parts):
              raise SystemExit('serializer reference staging parts are incomplete')
          target = root / 'src/diptrace_mcp/data/serializer_reference.json'
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(''.join(path.read_text(encoding='utf-8') for path in parts), encoding='utf-8')

          for path in parts + [
              root / '.github/serializer-reference.payload',
              root / '.github/payload-inspect-trigger',
              root / '.github/payload-inspect.json',
          ]:
              path.unlink(missing_ok=True)

          domain = root / 'src/diptrace_mcp/domain.py'
          text = domain.read_text(encoding='utf-8')
          old = '''    hole_width: float | None = Field(default=None, ge=0.0)\n    hole_height: float | None = Field(default=None, ge=0.0)\n    mask_paste: dict[str, str] = Field(default_factory=dict)\n'''
          new = '''    hole_width: float | None = Field(default=None, ge=0.0)\n    hole_height: float | None = Field(default=None, ge=0.0)\n    fiducial_keepout: float | None = Field(default=None, ge=0.0)\n    mask_paste: dict[str, str] = Field(default_factory=dict)\n'''
          if text.count(old) != 1:
              raise RuntimeError('LibraryPadStyle field anchor changed')
          domain.write_text(text.replace(old, new), encoding='utf-8')

          adapters = root / 'src/diptrace_mcp/library_adapters.py'
          text = adapters.read_text(encoding='utf-8')

          old = '''    if style is None or style.width <= 0.0 or style.height <= 0.0:\n        return None\n    shape_name = style.shape.casefold().replace(" ", "")\n    if shape_name in {"ellipse", "oval"}:\n        kind: Literal["circle", "ellipse", "rectangle", "obround"] = (\n            "circle" if math.isclose(style.width, style.height) else "ellipse"\n        )\n'''
          new = '''    if style is None or style.width <= 0.0:\n        return None\n    shape_name = style.shape.casefold().replace(" ", "")\n    effective_height = style.width if shape_name == "fiducial" else style.height\n    if effective_height <= 0.0:\n        return None\n    if shape_name == "fiducial":\n        kind: Literal["circle", "ellipse", "rectangle", "obround"] = "circle"\n    elif shape_name in {"ellipse", "oval"}:\n        kind = "circle" if math.isclose(style.width, effective_height) else "ellipse"\n'''
          if text.count(old) != 1:
              raise RuntimeError('_pad_geometry anchor changed')
          text = text.replace(old, new)

          old = '''        height=style.height,\n'''
          new = '''        height=effective_height,\n'''
          if text.count(old) != 1:
              raise RuntimeError('_pad_geometry height anchor changed')
          text = text.replace(old, new)

          old = '''        else:\n            shape = main.get("Shape", "")\n            width = to_mm(_number(main, "Width"), units)\n            height = to_mm(_number(main, "Height"), units)\n        hole = element.get("Hole")\n        hole_height = element.get("HoleH")\n        hole_width_mm = to_mm(float(hole), units) if hole else None\n        hole_height_mm = to_mm(float(hole_height), units) if hole_height else None\n        mask = element.find("./MaskPaste")\n'''
          new = '''        else:\n            shape = main.get("Shape", "")\n            width = to_mm(_number(main, "Width"), units)\n            height = (\n                width\n                if shape.casefold().replace(" ", "") == "fiducial"\n                else to_mm(_number(main, "Height"), units)\n            )\n        is_fiducial = shape.casefold().replace(" ", "") == "fiducial"\n        hole = element.get("Hole")\n        hole_height = element.get("HoleH")\n        hole_width_mm = to_mm(float(hole), units) if hole else None\n        hole_height_mm = to_mm(float(hole_height), units) if hole_height else None\n        mask = element.find("./MaskPaste")\n        custom_swell_raw = (\n            float(mask.get("CustomSwell"))\n            if mask is not None and mask.get("CustomSwell") is not None\n            else None\n        )\n        custom_shrink_raw = (\n            float(mask.get("CustomShrink"))\n            if mask is not None and mask.get("CustomShrink") is not None\n            else None\n        )\n        custom_swell = (\n            None\n            if custom_swell_raw is None or math.isclose(custom_swell_raw, -1000.0)\n            else to_mm(custom_swell_raw, units)\n        )\n        custom_shrink = (\n            None\n            if custom_shrink_raw is None or math.isclose(custom_shrink_raw, -1000.0)\n            else to_mm(custom_shrink_raw, units)\n        )\n'''
          if text.count(old) != 1:
              raise RuntimeError('_pad_styles header anchor changed')
          text = text.replace(old, new)

          old = '''                hole_width=(\n                    hole_width_mm\n                    if hole_width_mm is not None and hole_width_mm >= 0\n                    else None\n                ),\n                hole_height=(\n                    hole_height_mm\n                    if hole_height_mm is not None and hole_height_mm >= 0\n                    else None\n                ),\n                mask_paste=dict(mask.attrib) if mask is not None else {},\n                mask_paste_segments=segments,\n                custom_swell=(\n                    to_mm(float(mask.get("CustomSwell", "0")), units)\n                    if mask is not None and mask.get("CustomSwell") is not None\n                    else None\n                ),\n                custom_shrink=(\n                    to_mm(float(mask.get("CustomShrink", "0")), units)\n                    if mask is not None and mask.get("CustomShrink") is not None\n                    else None\n                ),\n'''
          new = '''                hole_width=(\n                    hole_width_mm\n                    if not is_fiducial and hole_width_mm is not None and hole_width_mm >= 0\n                    else None\n                ),\n                hole_height=(\n                    hole_height_mm\n                    if not is_fiducial and hole_height_mm is not None and hole_height_mm >= 0\n                    else None\n                ),\n                fiducial_keepout=(\n                    hole_width_mm\n                    if is_fiducial and hole_width_mm is not None and hole_width_mm >= 0\n                    else None\n                ),\n                mask_paste=dict(mask.attrib) if mask is not None else {},\n                mask_paste_segments=segments,\n                custom_swell=custom_swell,\n                custom_shrink=custom_shrink,\n'''
          if text.count(old) != 1:
              raise RuntimeError('_pad_styles geometry anchor changed')
          text = text.replace(old, new)

          old = '''            "Parser coverage is based on the official DipTrace 4.3 XML specification; "\n            "unknown newer fields are preserved but not interpreted."\n'''
          new = '''            "Parser coverage for newer library fields is constrained by the bundled "\n            "serializer-derived reference; unknown fields are preserved and real DipTrace "\n            "round-trip verification is still required."\n'''
          if text.count(old) != 1:
              raise RuntimeError('library warning anchor changed')
          text = text.replace(old, new)
          adapters.write_text(text, encoding='utf-8')
          PY
      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'
      - name: Validate full repository
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
          python -m ruff check --no-cache src tests benchmarks scripts
          python -m mypy --no-incremental src/diptrace_mcp
          python scripts/generate_pcb_skills.py --check
      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git commit -m 'feat: integrate serializer reference and regressions'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
