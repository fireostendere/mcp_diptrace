name: Apply serializer reference

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feat/serializer-reference' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply serializer reference integration
        run: python scripts/apply_serializer_reference.py
      - name: Fix strict typing for optional MaskPaste values
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/diptrace_mcp/library_adapters.py')
          text = path.read_text(encoding='utf-8')
          old = '''        swell_raw = (\n            float(mask.get("CustomSwell"))\n            if mask is not None and mask.get("CustomSwell") is not None\n            else None\n        )\n        shrink_raw = (\n            float(mask.get("CustomShrink"))\n            if mask is not None and mask.get("CustomShrink") is not None\n            else None\n        )\n'''
          new = '''        swell_value = mask.get("CustomSwell") if mask is not None else None\n        shrink_value = mask.get("CustomShrink") if mask is not None else None\n        swell_raw = float(swell_value) if swell_value is not None else None\n        shrink_raw = float(shrink_value) if shrink_value is not None else None\n'''
          if text.count(old) != 1:
              raise RuntimeError('MaskPaste typing anchor changed')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Format changed Python files
        run: python -m ruff format src/diptrace_mcp/domain.py src/diptrace_mcp/library_adapters.py src/diptrace_mcp/serializer_reference.py tests/test_serializer_reference.py
      - name: Validate repository and capture diagnostics
        id: validate
        shell: bash
        run: |
          set +e
          : > validation.log
          python -m pytest -q 2>&1 | tee -a validation.log
          pytest_code=${PIPESTATUS[0]}
          python -m ruff check --no-cache src tests benchmarks scripts 2>&1 | tee -a validation.log
          ruff_code=${PIPESTATUS[0]}
          python -m mypy --no-incremental src/diptrace_mcp 2>&1 | tee -a validation.log
          mypy_code=${PIPESTATUS[0]}
          python scripts/generate_pcb_skills.py --check 2>&1 | tee -a validation.log
          skills_code=${PIPESTATUS[0]}
          echo "codes: pytest=$pytest_code ruff=$ruff_code mypy=$mypy_code skills=$skills_code" | tee -a validation.log
          tar -czf serializer-applied.tgz \
            src/diptrace_mcp/domain.py \
            src/diptrace_mcp/library_adapters.py \
            src/diptrace_mcp/serializer_reference.py \
            src/diptrace_mcp/data/serializer_reference.json \
            src/diptrace_mcp/data/serializer_reference.schema.json \
            tests/test_serializer_reference.py \
            validation.log
          if (( pytest_code || ruff_code || mypy_code || skills_code )); then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serializer-applied
          path: serializer-applied.tgz
      - name: Commit and push verified integration
        if: success()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git commit -m 'feat: integrate serializer reference and parser fixes'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
