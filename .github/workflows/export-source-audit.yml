name: Export source audit

on:
  pull_request:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Package source
        run: |
          zip -qr mcp-diptrace-source.zip . -x '.git/*' 'mcp-diptrace-source.zip'
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-diptrace-source-audit
          path: mcp-diptrace-source.zip
