name: Export source audit

on:
  pull_request:
  push:
    branches:
      - agent/ci-semantic-comparison-final

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Package source
        run: |
          tar --exclude=.git --exclude=mcp-diptrace-source.tar.gz -czf mcp-diptrace-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-diptrace-source-audit
          path: mcp-diptrace-source.tar.gz
