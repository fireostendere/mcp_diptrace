name: Apply Python 3.10 cancellation fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/main-ci-310
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
      - name: Apply cancellation-race fix
        run: python scripts/apply_ci_310_fix.py
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Format changed files
        run: python -m ruff format src/diptrace_mcp/external_adapters.py tests/test_specctra.py
      - name: Lint project
        run: python -m ruff check --no-cache src tests benchmarks scripts/generate_pcb_skills.py scripts/mcp_smoke.py
      - name: Stress cancellation regression
        shell: bash
        run: |
          set -euo pipefail
          for iteration in $(seq 1 50); do
            echo "Cancellation regression run ${iteration}/50"
            python -m pytest -q tests/test_specctra.py::test_external_job_cancellation
          done
      - name: Run full tests
        run: python -m pytest -q --tb=long
      - name: Run Mypy
        run: python -m mypy --no-incremental src/diptrace_mcp
      - name: Check generated PCB skills
        run: python scripts/generate_pcb_skills.py --check
      - name: Commit validated fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/diptrace_mcp/external_adapters.py tests/test_specctra.py
          git commit -m 'fix: preserve cancellation across external process exit race'
          git push origin HEAD:fix/main-ci-310
