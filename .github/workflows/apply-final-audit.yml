name: Apply final prompt audit

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/ci-semantic-comparison-final
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply audited changes
        run: |
          python scripts/apply_final_prompt_audit.py
          sed -i '1i# ruff: noqa: E501' tests/test_prompt_acceptance.py
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Format audited files
        run: python -m ruff format src/diptrace_mcp/domain.py src/diptrace_mcp/service.py tests/test_trust_model.py tests/test_prompt_acceptance.py
      - name: Fix audited lint issues
        run: python -m ruff check --fix src/diptrace_mcp/domain.py src/diptrace_mcp/service.py tests/test_trust_model.py tests/test_prompt_acceptance.py
      - name: Check project lint
        run: python -m ruff check --no-cache src tests benchmarks scripts/generate_pcb_skills.py scripts/mcp_smoke.py
      - name: Run full tests
        run: python -m pytest -q
      - name: Run Mypy
        run: python -m mypy --no-incremental src/diptrace_mcp
      - name: Check generated PCB skills
        run: python scripts/generate_pcb_skills.py --check
      - name: Commit validated project changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/diptrace_mcp/domain.py src/diptrace_mcp/service.py tests/test_trust_model.py tests/test_prompt_acceptance.py
          git commit -m 'fix: close trust authority and acceptance test gaps'
          git push origin HEAD:agent/ci-semantic-comparison-final
